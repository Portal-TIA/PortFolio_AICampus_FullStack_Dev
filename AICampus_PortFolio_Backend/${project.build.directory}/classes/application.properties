# spring_db를 바라보도록 설정을 업데이트합니다. 포트 번호와 계정 정보를 정확히 맞췄습니다.

# 서버 설정
server.port=8087
server.servlet.context-path=/jpa

# DB 접속 정보 (sys 대신 spring_db 사용)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/spring_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=com
spring.datasource.password=com

# JPA 설정 (테이블 자동 생성 기능 유지)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true













